# RustDesk Server Docker Compose
# 用于本地开发测试的 data-server (hbbs + hbbr)
#
# 官方文档: https://rustdesk.com/docs/zh-cn/self-host/rustdesk-server-oss/docker/
#
# 端口说明:
#   - 21115 (TCP): NAT 类型测试
#   - 21116 (TCP/UDP): ID 注册和心跳服务
#   - 21117 (TCP): 中继服务
#   - 21118 (TCP): Web 客户端支持
#   - 21119 (TCP): Web 客户端支持
#
# 网络模式:
#   - host 模式 (默认): 性能最佳，仅支持 Linux
#   - bridge 模式: 跨平台兼容，macOS/Windows 使用

services:
  # hbbs - 信令服务器 (ID Server)
  hbbs:
    container_name: rustdesk-hbbs
    image: rustdesk/rustdesk-server:latest
    command: hbbs
    volumes:
      - ./data:/root
    network_mode: "host"
    environment:
      # 如果需要强制使用中继（禁用 P2P），取消下面的注释
      # - ALWAYS_USE_RELAY=Y
      # 仅允许加密连接
      # - ENCRYPTED_ONLY=1
      - TZ=Asia/Shanghai
    depends_on:
      - hbbr
    restart: unless-stopped

  # hbbr - 中继服务器 (Relay Server)
  hbbr:
    container_name: rustdesk-hbbr
    image: rustdesk/rustdesk-server:latest
    command: hbbr
    volumes:
      - ./data:/root
    network_mode: "host"
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped

