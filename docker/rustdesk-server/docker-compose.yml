# RustDesk Server Docker Compose
# 用于本地开发测试的 data-server (hbbs + hbbr)
#
# 官方文档: https://rustdesk.com/docs/zh-cn/self-host/rustdesk-server-oss/docker/
#
# 端口说明:
#   - 21115 (TCP): NAT 类型测试
#   - 21116 (TCP/UDP): ID 注册和心跳服务
#   - 21117 (TCP): 中继服务
#   - 21118 (TCP): Web 客户端支持
#   - 21119 (TCP): Web 客户端支持
#
# 使用 bridge 模式，兼容 macOS/Windows/Linux

services:
  # hbbs - 信令服务器 (ID Server)
  hbbs:
    container_name: rustdesk-hbbs
    # image: rustdesk/rustdesk-server:latest
    image: swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/rustdesk/rustdesk-server:latest
    command: hbbs
    volumes:
      - ./data:/root
    ports:
      - "21115:21115"
      - "21116:21116"
      - "21116:21116/udp"
      - "21118:21118"
    environment:
      - TZ=Asia/Shanghai
    depends_on:
      - hbbr
    restart: unless-stopped
    networks:
      - rustdesk-net

  # hbbr - 中继服务器 (Relay Server)
  hbbr:
    container_name: rustdesk-hbbr
    # image: rustdesk/rustdesk-server:latest
    image: swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/rustdesk/rustdesk-server:latest
    command: hbbr
    volumes:
      - ./data:/root
    ports:
      - "21117:21117"
      - "21119:21119"
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped
    networks:
      - rustdesk-net

networks:
  rustdesk-net:
    driver: bridge
