# Packager Configuration for nuwax-agent
# https://github.com/crabnebula-dev/cargo-packager

name = "nuwax-agent"
version = "0.1.0"
description = "跨平台 Agent 客户端，支持远程桌面和 Agent 任务执行"
homepage = "https://github.com/nuwax/nuwax-agent"
authors = ["nuwax <dev@nuwax.com>"]
identifier = "com.nuwax.agent"
publisher = "nuwax"
product-name = "Nuwax Agent"
license-file = "../../LICENSE"
copyright = "Copyright 2024 nuwax"

# 打包的二进制文件
binaries = [
    { path = "nuwax-gpui-agent", main = true }
]

# 打包格式
formats = ["dmg"]

# 输出目录
out-dir = "../../dist"

# 二进制文件所在目录
binaries-dir = "../../target/release"

[macos]
entitlements = "assets/macos/entitlements.plist"
signing-identity = "-"
minimum-system-version = "11.0"

[dmg]
background = "assets/macos/dmg-background.png"
[dmg.window-size]
width = 660
height = 400
[dmg.app-position]
x = 180
y = 170

[nsis]
header-image = "assets/windows/header.bmp"
sidebar-image = "assets/windows/sidebar.bmp"
installer-icon = "assets/windows/icon.ico"
languages = ["SimpChinese", "English"]
display-language-selector = true
compression = "lzma"

[wix]
languages = ["zh-CN", "en-US"]

[linux]
generate-desktop-entry = true

[deb]
section = "utils"
priority = "optional"

[appimage]
