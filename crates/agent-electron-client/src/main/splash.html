<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NuwaClaw</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    background: #f8f9fa;
    color: #18181b;
    user-select: none;
    -webkit-app-region: drag;
    overflow: hidden;
  }
  @media (prefers-color-scheme: dark) {
    body { background: #18181b; color: #e4e4e7; }
    .progress { color: #a1a1aa; }
    .spinner { border-color: #3f3f46; border-top-color: #a1a1aa; }
  }
  .logo {
    width: 64px;
    height: 64px;
    margin-bottom: 16px;
    border-radius: 14px;
  }
  .title {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.3px;
    margin-bottom: 20px;
  }
  .spinner {
    width: 24px;
    height: 24px;
    border: 2.5px solid #d4d4d8;
    border-top-color: #52525b;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .progress {
    font-size: 12px;
    color: #71717a;
    transition: opacity 0.2s;
  }
</style>
</head>
<body>
  <img class="logo" src="" id="logo" alt="">
  <div class="title">NuwaClaw</div>
  <div class="spinner"></div>
  <div class="progress" id="progress">Initializing...</div>
  <script>
    // Icon path injected by main process via query param
    const params = new URLSearchParams(window.location.search);
    const iconPath = params.get("icon");
    if (iconPath) document.getElementById("logo").src = iconPath;
  </script>
</body>
</html>
