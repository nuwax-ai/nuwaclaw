# Tauri 桌面客户端 — 开发构建 CI
# 用于日常开发验证，构建产物上传为 GitHub Artifacts 供下载测试
# 正式发布请使用 release-tauri.yml（通过推送 v* tag 触发）
#
# 触发方式：
#   - 推送到 dev 分支（自动）
#   - Pull Request 到 main/dev（自动）
#   - 手动触发 workflow_dispatch（可选择构建平台）
#
# 与 release-tauri.yml 的区别：
#   - 不创建 GitHub Release
#   - 不签名（不生成 .sig 和 latest.json）
#   - macOS 默认只构建 aarch64（节省 CI 时间）
#   - 产物以 Artifacts 形式保留 7 天

name: Tauri Desktop Client (Testing Build)

on:
  push:
    branches:
      - dev
    paths:
      - "crates/agent-tauri-client/**"
      - "crates/nuwax-agent-core/**"
      - "crates/agent-protocol/**"
      - "crates/system-permissions/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/ci-tauri.yml"
  pull_request:
    branches:
      - main
      - dev
    paths:
      - "crates/agent-tauri-client/**"
      - "crates/nuwax-agent-core/**"
      - "crates/agent-protocol/**"
      - "crates/system-permissions/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/ci-tauri.yml"
  workflow_dispatch:
    inputs:
      build_macos_x64:
        description: "构建 macOS x86_64 (Intel)"
        type: boolean
        default: false
      build_macos_universal:
        description: "构建 macOS Universal (Intel + Apple Silicon)"
        type: boolean
        default: false
      build_linux:
        description: "构建 Linux x86_64"
        type: boolean
        default: true
      build_windows:
        description: "构建 Windows x86_64"
        type: boolean
        default: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_NET_GIT_FETCH_WITH_CLI: true

permissions:
  contents: read

jobs:
  # ---- 确定要构建的平台矩阵 ----
  prepare:
    name: Prepare build matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Set build matrix
        id: set-matrix
        run: |
          # macOS aarch64 始终构建
          MATRIX='{"platform":"macos-latest","args":"--target aarch64-apple-darwin","rust_targets":"aarch64-apple-darwin,x86_64-apple-darwin","artifact_name":"macos-aarch64"}'

          # 手动触发时根据输入决定额外平台
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ inputs.build_macos_x64 }}" = "true" ]; then
              MATRIX="${MATRIX},{\"platform\":\"macos-latest\",\"args\":\"--target x86_64-apple-darwin\",\"rust_targets\":\"aarch64-apple-darwin,x86_64-apple-darwin\",\"artifact_name\":\"macos-x64\"}"
            fi
            if [ "${{ inputs.build_macos_universal }}" = "true" ]; then
              MATRIX="${MATRIX},{\"platform\":\"macos-latest\",\"args\":\"--target universal-apple-darwin\",\"rust_targets\":\"aarch64-apple-darwin,x86_64-apple-darwin\",\"artifact_name\":\"macos-universal\"}"
            fi
            if [ "${{ inputs.build_linux }}" = "true" ]; then
              MATRIX="${MATRIX},{\"platform\":\"ubuntu-22.04\",\"args\":\"\",\"rust_targets\":\"\",\"artifact_name\":\"linux-x64\"}"
            fi
            if [ "${{ inputs.build_windows }}" = "true" ]; then
              MATRIX="${MATRIX},{\"platform\":\"windows-latest\",\"args\":\"\",\"rust_targets\":\"\",\"artifact_name\":\"windows-x64\"}"
            fi
          else
            # push / PR 时默认构建所有平台
            MATRIX="${MATRIX},{\"platform\":\"ubuntu-22.04\",\"args\":\"\",\"rust_targets\":\"\",\"artifact_name\":\"linux-x64\"}"
            MATRIX="${MATRIX},{\"platform\":\"windows-latest\",\"args\":\"\",\"rust_targets\":\"\",\"artifact_name\":\"windows-x64\"}"
          fi

          MATRIX="{\"include\":[${MATRIX}]}"
          echo "matrix=${MATRIX}" >> "$GITHUB_OUTPUT"
          echo "Build matrix: ${MATRIX}"

  # ---- 构建 Tauri 应用 ----
  build-tauri:
    name: Build (${{ matrix.artifact_name }})
    needs: prepare
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure git credentials for private repos
        run: |
          git config --global url."https://${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"

      # ---- protobuf 编译器 ----
      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install protoc (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          PROTOC_VERSION=28.3
          curl -LO "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-linux-x86_64.zip"
          sudo unzip -o "protoc-${PROTOC_VERSION}-linux-x86_64.zip" -d /usr/local bin/protoc
          sudo unzip -o "protoc-${PROTOC_VERSION}-linux-x86_64.zip" -d /usr/local 'include/*'
          rm "protoc-${PROTOC_VERSION}-linux-x86_64.zip"
          protoc --version

      - name: Install protoc (Windows)
        if: runner.os == 'Windows'
        run: choco install protoc -y

      # ---- 系统依赖 (Ubuntu) ----
      - name: Install system dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config

      # ---- 系统依赖 (Windows) ----
      - name: Install system dependencies (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          echo "VCPKG_ROOT=$VCPKG_INSTALLATION_ROOT" >> "$GITHUB_ENV"
          vcpkg install opus:x64-windows-static-md

      # ---- pnpm ----
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: crates/agent-tauri-client/package.json

      # ---- Node.js ----
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
          cache-dependency-path: crates/agent-tauri-client/pnpm-lock.yaml

      # ---- Rust ----
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          cache-on-failure: true

      # ---- 跨平台 cargo test ----
      # 只测试 Tauri 客户端及其依赖，避免编译 agent-server-admin
      - name: Run cargo tests
        run: cargo test -p agent-tauri-client -p nuwax-agent-core -p agent-protocol -p system-permissions -- --nocapture
        continue-on-error: true

      # ---- 前端依赖 ----
      - name: Install frontend dependencies
        working-directory: crates/agent-tauri-client
        run: pnpm install

      # ---- 下载 Node.js 运行时 ----
      - name: Download Node.js runtime (macOS universal)
        if: runner.os == 'macOS' && contains(matrix.args, 'universal')
        run: |
          ./scripts/download-node.sh darwin arm64
          cp crates/agent-tauri-client/src-tauri/resources/node/bin/node /tmp/node-arm64
          ./scripts/download-node.sh darwin x64
          cp crates/agent-tauri-client/src-tauri/resources/node/bin/node /tmp/node-x64
          lipo -create /tmp/node-arm64 /tmp/node-x64 -output crates/agent-tauri-client/src-tauri/resources/node/bin/node
          chmod 755 crates/agent-tauri-client/src-tauri/resources/node/bin/node
          echo "==> Universal Node.js binary:"
          file crates/agent-tauri-client/src-tauri/resources/node/bin/node
          lipo -info crates/agent-tauri-client/src-tauri/resources/node/bin/node

      # ---- 合并 nuwax-lanproxy 为 universal binary ----
      - name: Create universal nuwax-lanproxy binary
        if: runner.os == 'macOS' && contains(matrix.args, 'universal')
        run: |
          BINARIES_DIR=crates/agent-tauri-client/src-tauri/binaries
          lipo -create \
            "${BINARIES_DIR}/nuwax-lanproxy-aarch64-apple-darwin" \
            "${BINARIES_DIR}/nuwax-lanproxy-x86_64-apple-darwin" \
            -output "${BINARIES_DIR}/nuwax-lanproxy-universal-apple-darwin"
          chmod 755 "${BINARIES_DIR}/nuwax-lanproxy-universal-apple-darwin"
          echo "==> Universal nuwax-lanproxy binary:"
          file "${BINARIES_DIR}/nuwax-lanproxy-universal-apple-darwin"
          lipo -info "${BINARIES_DIR}/nuwax-lanproxy-universal-apple-darwin"

      - name: Download Node.js runtime (macOS aarch64)
        if: runner.os == 'macOS' && contains(matrix.args, 'aarch64')
        run: ./scripts/download-node.sh darwin arm64

      - name: Download Node.js runtime (macOS x86_64)
        if: runner.os == 'macOS' && contains(matrix.args, 'x86_64')
        run: ./scripts/download-node.sh darwin x64

      - name: Download Node.js runtime (Linux)
        if: runner.os == 'Linux'
        run: ./scripts/download-node.sh linux x64

      - name: Download Node.js runtime (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: ./scripts/download-node.sh win x64

      # ---- 下载 uv 运行时 ----
      - name: Download uv (macOS universal)
        if: runner.os == 'macOS' && contains(matrix.args, 'universal')
        run: |
          ./scripts/download-uv.sh darwin arm64
          cp crates/agent-tauri-client/src-tauri/resources/uv/bin/uv /tmp/uv-arm64
          cp crates/agent-tauri-client/src-tauri/resources/uv/bin/uvx /tmp/uvx-arm64
          ./scripts/download-uv.sh darwin x64
          cp crates/agent-tauri-client/src-tauri/resources/uv/bin/uv /tmp/uv-x64
          cp crates/agent-tauri-client/src-tauri/resources/uv/bin/uvx /tmp/uvx-x64
          lipo -create /tmp/uv-arm64 /tmp/uv-x64 -output crates/agent-tauri-client/src-tauri/resources/uv/bin/uv
          lipo -create /tmp/uvx-arm64 /tmp/uvx-x64 -output crates/agent-tauri-client/src-tauri/resources/uv/bin/uvx
          chmod 755 crates/agent-tauri-client/src-tauri/resources/uv/bin/uv
          chmod 755 crates/agent-tauri-client/src-tauri/resources/uv/bin/uvx
          echo "==> Universal uv binary:"
          file crates/agent-tauri-client/src-tauri/resources/uv/bin/uv
          lipo -info crates/agent-tauri-client/src-tauri/resources/uv/bin/uv

      - name: Download uv (macOS aarch64)
        if: runner.os == 'macOS' && contains(matrix.args, 'aarch64')
        run: ./scripts/download-uv.sh darwin arm64

      - name: Download uv (macOS x86_64)
        if: runner.os == 'macOS' && contains(matrix.args, 'x86_64')
        run: ./scripts/download-uv.sh darwin x64

      - name: Download uv (Linux)
        if: runner.os == 'Linux'
        run: ./scripts/download-uv.sh linux x64

      - name: Download uv (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: ./scripts/download-uv.sh win x64

      # ---- 下载 sidecar（mcp-proxy/node-runtime）到缓存，并按当前构建目标投放到 binaries ----
      - name: Download sidecars for current target
        shell: bash
        run: |
          BINARIES_DIR="crates/agent-tauri-client/src-tauri/binaries"
          if [ "${{ runner.os }}" = "macOS" ]; then
            if [[ "${{ matrix.args }}" == *"universal-apple-darwin"* ]]; then
              ./scripts/download-sidecars.sh --target aarch64-apple-darwin --target x86_64-apple-darwin --materialize
              lipo -create \
                "${BINARIES_DIR}/mcp-proxy-aarch64-apple-darwin" \
                "${BINARIES_DIR}/mcp-proxy-x86_64-apple-darwin" \
                -output "${BINARIES_DIR}/mcp-proxy-universal-apple-darwin"
              lipo -create \
                "${BINARIES_DIR}/node-runtime-aarch64-apple-darwin" \
                "${BINARIES_DIR}/node-runtime-x86_64-apple-darwin" \
                -output "${BINARIES_DIR}/node-runtime-universal-apple-darwin"
              chmod 755 "${BINARIES_DIR}/mcp-proxy-universal-apple-darwin" "${BINARIES_DIR}/node-runtime-universal-apple-darwin"
            elif [[ "${{ matrix.args }}" == *"x86_64-apple-darwin"* ]]; then
              ./scripts/download-sidecars.sh --target x86_64-apple-darwin --materialize
            else
              ./scripts/download-sidecars.sh --target aarch64-apple-darwin --materialize
            fi
          elif [ "${{ runner.os }}" = "Linux" ]; then
            ./scripts/download-sidecars.sh --target x86_64-unknown-linux-gnu --materialize
          else
            ./scripts/download-sidecars.sh --target x86_64-pc-windows-msvc --materialize
          fi

      # ---- macOS：仅当配置了证书时导入 keychain，供后续 codesign 使用 ----
      # 需在仓库 Secrets 配置 APPLE_CERTIFICATE（Base64 编码的 .p12）、APPLE_CERTIFICATE_PASSWORD。
      # 未配置时脚本内判断并跳过导入，签名步骤由 sign-macos-resource-bins.sh 在 identity 为空时跳过。
      # 若需在 CI 中签名，须同时配置 APPLE_CERTIFICATE 与 APPLE_SIGNING_IDENTITY；仅配 identity 会因 keychain 无证书而失败。
      # 注意：不能在 if 中使用 secrets 上下文，故在 run 内判断。
      - name: Import Apple certificate for code signing
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "${APPLE_CERTIFICATE:-}" ]; then
            echo "==> APPLE_CERTIFICATE not set, skipping import"
            exit 0
          fi
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=actions
          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          rm -f "$CERTIFICATE_PATH"

      # ---- macOS：安装 create-dmg 用于创建带 Applications 快捷方式的 DMG ----
      - name: Install create-dmg (macOS)
        if: runner.os == 'macOS'
        run: brew install create-dmg

      # ---- macOS：对 node/uv 资源做 codesign；未设置 APPLE_SIGNING_IDENTITY 时脚本内跳过 ----
      - name: Sign macOS resource binaries (node, uv)
        if: runner.os == 'macOS'
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: ./scripts/sign-macos-resource-bins.sh

      # ---- 构建（不创建 Release，不生成 latest.json / updater 签名文件） ----
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        with:
          projectPath: crates/agent-tauri-client
          # 使用额外的 CI 配置关闭 bundle.createUpdaterArtifacts，
          # 这样即使启用了 updater 插件也不会生成更新签名文件。
          # 同时通过 includeUpdaterJson=false 禁用 latest.json 生成。
          args: ${{ matrix.args }} --config src-tauri/tauri.ci.conf.json
          includeUpdaterJson: false

      # ---- macOS：Tauri 签名后对 node-runtime 补签 JIT entitlement，并重建 dmg/tar.gz ----
      # Tauri bundler 对 sidecar 签名时不附带 entitlements，但 node-runtime (V8) 需要 JIT。
      # 此步骤在 Tauri 构建完成后：重签 node-runtime → 重签 .app → 重建 .dmg/.tar.gz
      - name: Post-sign node-runtime with JIT entitlement
        if: runner.os == 'macOS'
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          # 从 matrix.args 提取 --target 值
          TARGET=""
          if [[ "${{ matrix.args }}" == *"--target "* ]]; then
            TARGET=$(echo "${{ matrix.args }}" | grep -o '\-\-target [^ ]*' | head -1 | awk '{print $2}')
          fi
          if [ -n "$TARGET" ]; then
            ./scripts/post-sign-macos-app.sh --target "$TARGET"
          else
            ./scripts/post-sign-macos-app.sh
          fi

      # ---- 上传构建产物为 Artifacts ----
      - name: Upload build artifacts (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: tauri-build-${{ matrix.artifact_name }}
          path: |
            target/*/release/bundle/dmg/*.dmg
            target/*/release/bundle/macos/*.app.tar.gz
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload build artifacts (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: tauri-build-${{ matrix.artifact_name }}
          path: |
            target/release/bundle/deb/*.deb
            target/release/bundle/appimage/*.AppImage
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload build artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: tauri-build-${{ matrix.artifact_name }}
          path: |
            target/release/bundle/msi/*.msi
            target/release/bundle/nsis/*.exe
          retention-days: 7
          if-no-files-found: ignore
