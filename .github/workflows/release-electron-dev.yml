# Electron 桌面客户端 — 预发布版本构建
# 通过 prerelease-v* tag 触发，构建全平台安装包并创建 GitHub Draft Release。
#
# 触发方式：
#   - 推送 tag 匹配 prerelease-v*（例如 prerelease-v0.8.0）→ 构建全平台安装包并创建 Draft Release
#
# 支持平台：
#   - macOS arm64（macos-latest）
#   - macOS x64（macos-latest, cross-compile）
#   - Windows x64（msi）
#   - Linux x64（AppImage + deb）
#   - Linux arm64（AppImage + deb）
#
# 使用的 Secrets（可与 Tauri 共用 Apple 相关，也可单独配置）：
#   - GH_PAT（可选）：创建 Release、上传资产（未配置时自动回退到 github.token，需 Contents: Write）
#   - macOS 签名/公证（未配置时 Mac 构建为无签名包，用户打开会提示「已损坏」）：
#     - APPLE_TEAM_ID / APPLE_SIGNING_IDENTITY / APPLE_CERTIFICATE（.p12 Base64）/ APPLE_CERTIFICATE_PASSWORD
#     - 公证：APPLE_API_KEY（.p8 Base64）/ APPLE_API_KEY_ID / APPLE_ISSUER_ID
#   - Windows 签名（至少提供一种证书来源）：
#     - 证书来源 A（证书存储）：WINDOWS_CERTIFICATE_SHA1
#     - 证书来源 B（PFX）：WINDOWS_CERTIFICATE_PFX_BASE64 + WINDOWS_CERTIFICATE_PASSWORD
#     - 可选：WINDOWS_TIMESTAMP_URL / WINDOWS_PUBLISHER_NAME
#
# 产物目录：crates/agent-electron-client/release/${version}/（由 package.json directories.output 决定）

name: Release Electron App (Prerelease)

on:
  push:
    tags:
      - "prerelease-v*"

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#prerelease-v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Electron prerelease version: $VERSION"

      - name: Read release notes
        id: notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ github.ref_name }}"
          NOTES_FILE="release-notes/${TAG}.md"
          if [ -f "$NOTES_FILE" ]; then
            echo "Using release notes from $NOTES_FILE"
            cp "$NOTES_FILE" release_notes.txt
          else
            echo "NuwaClaw ${VERSION} (Prerelease)。请在 Assets 中下载对应平台安装包。" > release_notes.txt
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" 2>/dev/null; then
            echo "Release $TAG already exists"
          else
            gh release create "$TAG" \
              --title "NuwaClaw (Electron) ${{ steps.version.outputs.version }} - Prerelease" \
              --notes-file release_notes.txt \
              --draft \
              --prerelease \
              --repo "$GITHUB_REPOSITORY"
            echo "Created release $TAG"
          fi

  build-electron:
    name: Build Electron (${{ matrix.platform }} ${{ matrix.arch }})
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            arch: arm64
            dist_cmd: dist:mac:arm64
          - platform: macos-latest
            arch: x64
            dist_cmd: dist:mac:x64
          - platform: windows-latest
            arch: x64
            dist_cmd: dist:win
          - platform: ubuntu-24.04
            arch: x64
            dist_cmd: dist:linux:x64

          - platform: ubuntu-24.04-arm
            arch: arm64
            dist_cmd: dist:linux:arm64

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version in package.json
        shell: bash
        working-directory: crates/agent-electron-client
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          npm pkg set version="$VERSION"
          echo "package.json version: $(npm pkg get version)"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      # 安装 pnpm（用于 workspace 管理，版本由根 package.json packageManager 字段指定）
      - name: Install pnpm
        uses: pnpm/action-setup@v4

      # Python 3.12+ 移除了 distutils，node-gyp（better-sqlite3 等 native 模块）依赖它；安装 setuptools 以提供 distutils
      - name: Install setuptools for node-gyp (Python 3.12+)
        shell: bash
        run: python3 -m pip install setuptools --break-system-packages 2>/dev/null || python3 -m pip install setuptools

      # Linux 构建 deb/rpm 包需要 rpm 工具；arm64 runner 需要系统 fpm（内置 fpm 仅 x86）
      - name: Install Linux build tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm ruby ruby-dev
          sudo gem install fpm
          echo "USE_SYSTEM_FPM=true" >> "$GITHUB_ENV"

      # pnpm install 会建立 workspace 链接，nuwax-mcp-stdio-proxy 通过 prepare 脚本自动构建
      - name: Install workspace dependencies
        run: pnpm install --filter @nuwax-ai/nuwaclaw...

      # 为 Electron 内嵌 Node 重编 better-sqlite3，避免 Linux arm64 等平台运行时 "cannot open shared object file"
      - name: Rebuild native modules for Electron
        working-directory: crates/agent-electron-client
        run: npm run electron-rebuild

      # 缓存内置 Node.js（所有平台）、Git（仅 Windows）和 uv（所有平台）
      - name: Cache bundled Node.js
        uses: actions/cache@v4
        with:
          path: crates/agent-electron-client/resources/node
          key: bundled-node-24-${{ matrix.platform }}-${{ matrix.arch }}-${{ hashFiles('crates/agent-electron-client/package.json') }}

      - name: Cache bundled Git (Windows only)
        if: matrix.platform == 'windows-latest'
        uses: actions/cache@v4
        with:
          path: crates/agent-electron-client/resources/git
          key: bundled-git-2.47.1-windows-${{ hashFiles('crates/agent-electron-client/package.json') }}

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: crates/agent-electron-client/resources/uv
          key: bundled-uv-v2-${{ matrix.platform }}-${{ matrix.arch }}-${{ hashFiles('crates/agent-electron-client/scripts/prepare/prepare-uv.js') }}

      - name: Prepare bundled resources (uv, node, git)
        working-directory: crates/agent-electron-client
        env:
          TARGET_ARCH: ${{ matrix.arch }}
        run: npm run prepare:all
        timeout-minutes: 15

      # ---- macOS：导入证书并配置公证（可选） ----
      - name: Import Apple certificate (macOS)
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "${APPLE_CERTIFICATE:-}" ]; then
            echo "APPLE_CERTIFICATE not set, signing will be skipped"
            exit 0
          fi
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=actions
          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          rm -f "$CERTIFICATE_PATH"
          echo "CSC_KEYCHAIN=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Prepare Apple notarization key (macOS)
        if: runner.os == 'macOS'
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_ISSUER_ID: ${{ secrets.APPLE_ISSUER_ID }}
        run: |
          if [ -z "${APPLE_API_KEY:-}" ] || [ -z "${APPLE_API_KEY_ID:-}" ]; then
            echo "Apple notarization secrets not set, notarization will be skipped"
            exit 0
          fi
          if [ -z "${APPLE_ISSUER_ID:-}" ]; then
            echo "APPLE_ISSUER_ID required for notarization"
            exit 0
          fi
          mkdir -p "$RUNNER_TEMP/apple-api-key"
          echo -n "$APPLE_API_KEY" | base64 --decode -o "$RUNNER_TEMP/apple-api-key/AuthKey.p8"
          echo "APPLE_API_KEY=$RUNNER_TEMP/apple-api-key/AuthKey.p8" >> "$GITHUB_ENV"
          echo "APPLE_API_KEY_ID=$APPLE_API_KEY_ID" >> "$GITHUB_ENV"
          echo "APPLE_API_ISSUER=$APPLE_ISSUER_ID" >> "$GITHUB_ENV"

      - name: Prepare Windows signing environment
        if: runner.os == 'Windows'
        shell: bash
        env:
          WINDOWS_CERTIFICATE_SHA1: ${{ secrets.WINDOWS_CERTIFICATE_SHA1 }}
          WINDOWS_CERTIFICATE_PFX_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_PFX_BASE64 }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          WINDOWS_TIMESTAMP_URL: ${{ secrets.WINDOWS_TIMESTAMP_URL }}
          WINDOWS_PUBLISHER_NAME: ${{ secrets.WINDOWS_PUBLISHER_NAME }}
        run: |
          set -euo pipefail

          echo "WINDOWS_SIGNING_ENABLED=0" >> "$GITHUB_ENV"

          if [ -z "${WINDOWS_CERTIFICATE_SHA1:-}" ] && [ -z "${WINDOWS_CERTIFICATE_PFX_BASE64:-}" ]; then
            echo "::warning::Windows signing is not configured. Build will continue unsigned."
            exit 0
          fi

          if [ -n "${WINDOWS_CERTIFICATE_PFX_BASE64:-}" ]; then
            CERT_PATH="$RUNNER_TEMP/windows-signing.pfx"
            echo -n "$WINDOWS_CERTIFICATE_PFX_BASE64" | base64 --decode > "$CERT_PATH"
            echo "WINDOWS_CERTIFICATE_PATH=$CERT_PATH" >> "$GITHUB_ENV"
            echo "WIN_CSC_LINK=$CERT_PATH" >> "$GITHUB_ENV"
            if [ -n "${WINDOWS_CERTIFICATE_PASSWORD:-}" ]; then
              echo "WINDOWS_CERTIFICATE_PASSWORD=$WINDOWS_CERTIFICATE_PASSWORD" >> "$GITHUB_ENV"
              echo "WIN_CSC_KEY_PASSWORD=$WINDOWS_CERTIFICATE_PASSWORD" >> "$GITHUB_ENV"
            else
              echo "::warning::WINDOWS_CERTIFICATE_PASSWORD is empty; signing may fail if PFX requires password."
            fi
            if [ -n "${WINDOWS_CERTIFICATE_SHA1:-}" ]; then
              echo "WINDOWS_CERTIFICATE_SHA1=$WINDOWS_CERTIFICATE_SHA1" >> "$GITHUB_ENV"
            fi
            echo "WINDOWS_TIMESTAMP_URL=${WINDOWS_TIMESTAMP_URL:-http://timestamp.sectigo.com}" >> "$GITHUB_ENV"
            echo "WINDOWS_PUBLISHER_NAME=${WINDOWS_PUBLISHER_NAME:-成都第二空间智能科技有限公司}" >> "$GITHUB_ENV"
            echo "WINDOWS_SIGNING_ENABLED=1" >> "$GITHUB_ENV"
          else
            echo "::warning::WINDOWS_CERTIFICATE_PFX_BASE64 missing on windows-latest; build will continue unsigned."
          fi

      # 若用户看到「已损坏」：请确认已配置 APPLE_CERTIFICATE / APPLE_SIGNING_IDENTITY 及公证用 APPLE_API_KEY 等，且构建日志中有签名与公证成功
      - name: Clean previous build artifacts
        shell: bash
        working-directory: crates/agent-electron-client
        run: |
          rm -rf release node_modules/.cache
          echo "Cleaned release and cache directories"

      - name: Build Electron app
        shell: bash
        working-directory: crates/agent-electron-client
        env:
          TARGET_ARCH: ${{ matrix.arch }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          CSC_NAME: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          if [ "${{ runner.os }}" = "macOS" ] && [ -z "${{ secrets.APPLE_CERTIFICATE }}" ]; then
            echo "No Apple certificate, building unsigned Mac package for ${{ matrix.arch }}"
            npm run dist:mac:unsigned:${{ matrix.arch }} -- --publish never
          elif [ "${{ runner.os }}" = "Windows" ]; then
            BUILD_ARGS=(--publish never)
            if [ -n "${WINDOWS_CERTIFICATE_SHA1:-}" ]; then
              BUILD_ARGS+=("-c.win.certificateSha1=${WINDOWS_CERTIFICATE_SHA1}")
            fi
            npm run ${{ matrix.dist_cmd }} -- "${BUILD_ARGS[@]}"
          else
            npm run ${{ matrix.dist_cmd }} -- --publish never
          fi

      - name: Verify Windows signatures
        if: runner.os == 'Windows'
        shell: bash
        working-directory: crates/agent-electron-client
        run: |
          if [ "${WINDOWS_SIGNING_ENABLED:-0}" != "1" ]; then
            echo "Windows signing disabled; skip verification."
            exit 0
          fi

          VERSION="${{ needs.prepare.outputs.version }}"
          BASE_DIR="release/${VERSION}"
          TARGETS=(
            "${BASE_DIR}/NuwaClaw.Setup.${VERSION}.exe"
            "${BASE_DIR}/NuwaClaw.${VERSION}.msi"
          )

          OPTIONAL_DIRS=(
            "${BASE_DIR}/win-unpacked/resources/uv/bin"
            "${BASE_DIR}/win-unpacked/resources/node"
            "${BASE_DIR}/win-unpacked/resources/lanproxy"
            "${BASE_DIR}/win-unpacked/resources/app.asar.unpacked/node_modules/better-sqlite3/build/Release"
            "${BASE_DIR}/win-unpacked/resources/nuwax-mcp-stdio-proxy"
            "${BASE_DIR}/win-unpacked/resources/git"
          )

          for d in "${OPTIONAL_DIRS[@]}"; do
            if [ -d "$d" ]; then
              TARGETS+=("$d")
            fi
          done

          npm run verify:sign:win -- "${TARGETS[@]}"

      - name: Upload artifacts to Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${{ needs.prepare.outputs.version }}"
          OUT_DIR="crates/agent-electron-client/release/${VERSION}"
          if [ ! -d "$OUT_DIR" ]; then
            echo "::error::Output directory not found: $OUT_DIR"
            exit 1
          fi
          for f in "${OUT_DIR}"/*; do
            [ -e "$f" ] || continue
            [ -f "$f" ] || continue
            echo "Uploading $(basename "$f") ..."
            gh release upload "$TAG" "$f" --clobber --repo "$GITHUB_REPOSITORY"
          done
