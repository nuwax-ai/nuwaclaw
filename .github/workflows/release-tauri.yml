# Tauri 桌面客户端 — 正式版本发布
# 推送 v* tag 触发，自动构建全平台安装包并创建 GitHub Release
# 日常开发测试请使用 ci-tauri.yml（推送 dev 分支或手动触发）
#
# 支持平台：
#   - macOS Universal (Intel + Apple Silicon 通用安装包)
#   - macOS arm64 (M1+)
#   - macOS x86_64 (Intel)
#   - Windows x86_64
#   - Linux x86_64
#
# 触发方式：
#   - 推送 v* tag → 构建 + 创建 Release + 签名 + 生成 latest.json
#
# 注意事项：
#   - nuwax-agent-core 依赖了 nuwax-ai 组织的 git 仓库（rcoder）
#     GH_PAT：拉取私有依赖需 Contents: Read；创建/编辑 Release、上传资产需 Contents: Write（可同一 Token 配齐）
#   - Tauri 客户端不启用 p2p-connection feature，因此不依赖 librustdesk / vcpkg
#
# 使用的 GitHub Actions Secrets（Settings → Secrets and variables → Actions，应使用线上已配置的）：
#   - GH_PAT：拉取私有依赖、创建 Release、上传资产
#   - APPLE_CERTIFICATE / APPLE_CERTIFICATE_PASSWORD / APPLE_SIGNING_IDENTITY：macOS 签名
#   - APPLE_API_KEY / APPLE_API_KEY_ID / APPLE_ISSUER_ID：macOS 公证（App Store Connect API Key，未配置则跳过公证）
#   - TAURI_SIGNING_PRIVATE_KEY / TAURI_SIGNING_PRIVATE_KEY_PASSWORD：Tauri 更新包签名
#   - OSS_ACCESS_KEY_ID / OSS_ACCESS_KEY_SECRET：上传到阿里云 OSS（latest.json 等）
#   - APPLE_ID / APPLE_PASSWORD / APPLE_TEAM_ID：若使用 Apple ID 公证方式时可选用（本 workflow 使用 API Key 方式）

name: Release Tauri App

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # 使用系统 git 拉取 cargo git 依赖，确保能使用已配置的凭据
  CARGO_NET_GIT_FETCH_WITH_CLI: true

permissions:
  contents: write

jobs:
  # ---- 准备发布说明并预先创建 Release ----
  # 从 release-notes/{tag}.md 读取更新日志；先在此处创建 Release，避免 5 个 matrix 任务同时创建导致竞态（仅 Mac 报 Server Error 多为该原因）
  prepare-release:
    name: Prepare release notes
    runs-on: ubuntu-latest
    outputs:
      release_notes: ${{ steps.notes.outputs.content }}
    steps:
      - uses: actions/checkout@v4
      - name: Read release notes
        id: notes
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          NOTES_FILE="release-notes/${TAG}.md"
          if [ -f "$NOTES_FILE" ]; then
            CONTENT=$(cat "$NOTES_FILE")
          else
            CONTENT="功能优化和问题修复。建议更新到最新版本以获得更好的体验。"
          fi
          echo "content<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CONTENT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "$CONTENT" > release_notes.txt

      # 先创建 Release，避免多个 matrix 任务同时“创建”导致冲突（仅 Mac 报错多为竞态）
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          TAG="${{ github.ref_name }}"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" 2>/dev/null; then
            echo "Release $TAG already exists, skipping create"
          else
            gh release create "$TAG" --notes-file release_notes.txt --repo "$GITHUB_REPOSITORY"
            echo "Created release $TAG"
          fi

  release-tauri:
    name: Build Tauri (${{ matrix.platform }})
    needs: prepare-release
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Universal — 同时包含 Intel 和 Apple Silicon，用户只需下载一个安装包
          - platform: macos-latest
            args: "--target universal-apple-darwin"
            rust_targets: "aarch64-apple-darwin,x86_64-apple-darwin"
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            rust_targets: "aarch64-apple-darwin,x86_64-apple-darwin"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            rust_targets: "aarch64-apple-darwin,x86_64-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
            rust_targets: ""
          - platform: windows-latest
            args: ""
            rust_targets: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---- 私有 Git 仓库认证（nuwax-ai 组织下的 rcoder, nuwax-rustdesk 等） ----
      # Settings → Secrets 配置 GH_PAT（拉取私有依赖 + Release 操作用同一 Token 时需 Contents: Read + Write）
      - name: Configure git credentials for private repos
        run: |
          git config --global url."https://${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"

      # ---- protobuf 编译器（shared_types 的 prost-build 需要） ----
      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install protoc (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          # Ubuntu 22.04 自带的 protoc 3.12 不支持 proto3 optional 字段，需要 3.15+
          PROTOC_VERSION=28.3
          curl -LO "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-linux-x86_64.zip"
          sudo unzip -o "protoc-${PROTOC_VERSION}-linux-x86_64.zip" -d /usr/local bin/protoc
          sudo unzip -o "protoc-${PROTOC_VERSION}-linux-x86_64.zip" -d /usr/local 'include/*'
          rm "protoc-${PROTOC_VERSION}-linux-x86_64.zip"
          protoc --version

      - name: Install protoc (Windows)
        if: runner.os == 'Windows'
        run: choco install protoc -y

      # ---- 系统依赖 (Ubuntu) ----
      # libwebkit2gtk-4.1-dev: Tauri 2.0 WebView
      # libappindicator3-dev:  系统托盘图标
      # librsvg2-dev:          SVG 图标渲染
      # patchelf:              ELF 二进制 rpath 修复
      # libssl-dev + pkg-config: reqwest (nuwax-agent-core 的 dependency-management feature)
      # libgtk-3-dev:          GTK3 窗口框架
      - name: Install system dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config

      # ---- pnpm（从 package.json 的 packageManager 字段读取版本 9.15.5） ----
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: crates/agent-tauri-client/package.json

      # ---- Node.js（pnpm 缓存指向子目录的 lockfile） ----
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
          cache-dependency-path: crates/agent-tauri-client/pnpm-lock.yaml

      # ---- Rust ----
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      # Cargo workspace 在仓库根目录，target 也在根目录
      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          cache-on-failure: true

      # ---- 从 git tag 同步版本号到 package.json ----
      # tauri.conf.json 的 version 已指向 "../package.json"，Tauri 会自动读取
      # 因此只需更新 package.json 这一个文件即可
      - name: Sync version from git tag
        if: github.ref_type == 'tag'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Syncing version: $VERSION"
          cd crates/agent-tauri-client
          jq --arg v "$VERSION" '.version = $v' package.json > package.json.tmp && mv package.json.tmp package.json
          echo "package.json version: $(jq -r .version package.json)"

      # ---- 前端依赖 ----
      - name: Install frontend dependencies
        working-directory: crates/agent-tauri-client
        run: pnpm install

      # ---- 下载 Node.js 运行时到 Tauri 资源目录（bundle resources 需要） ----
      - name: Download Node.js runtime (macOS universal)
        if: runner.os == 'macOS' && contains(matrix.args, 'universal')
        run: |
          # 下载 arm64 版本
          ./scripts/download-node.sh darwin arm64
          cp crates/agent-tauri-client/src-tauri/resources/node/bin/node /tmp/node-arm64

          # 下载 x64 版本（脚本会清空并重建目录）
          ./scripts/download-node.sh darwin x64
          cp crates/agent-tauri-client/src-tauri/resources/node/bin/node /tmp/node-x64

          # 用 lipo 合并为 universal binary（lib/ 目录是 JS 文件，与架构无关，保留 x64 版本即可）
          lipo -create /tmp/node-arm64 /tmp/node-x64 -output crates/agent-tauri-client/src-tauri/resources/node/bin/node
          chmod 755 crates/agent-tauri-client/src-tauri/resources/node/bin/node

          # 验证 universal binary
          echo "==> Universal Node.js binary:"
          file crates/agent-tauri-client/src-tauri/resources/node/bin/node
          lipo -info crates/agent-tauri-client/src-tauri/resources/node/bin/node

      # ---- 合并 nuwax-lanproxy 为 universal binary ----
      - name: Create universal nuwax-lanproxy binary
        if: runner.os == 'macOS' && contains(matrix.args, 'universal')
        run: |
          BINARIES_DIR=crates/agent-tauri-client/src-tauri/binaries
          lipo -create \
            "${BINARIES_DIR}/nuwax-lanproxy-aarch64-apple-darwin" \
            "${BINARIES_DIR}/nuwax-lanproxy-x86_64-apple-darwin" \
            -output "${BINARIES_DIR}/nuwax-lanproxy-universal-apple-darwin"
          chmod 755 "${BINARIES_DIR}/nuwax-lanproxy-universal-apple-darwin"
          echo "==> Universal nuwax-lanproxy binary:"
          file "${BINARIES_DIR}/nuwax-lanproxy-universal-apple-darwin"
          lipo -info "${BINARIES_DIR}/nuwax-lanproxy-universal-apple-darwin"

      - name: Download Node.js runtime (macOS aarch64)
        if: runner.os == 'macOS' && contains(matrix.args, 'aarch64')
        run: ./scripts/download-node.sh darwin arm64

      - name: Download Node.js runtime (macOS x86_64)
        if: runner.os == 'macOS' && contains(matrix.args, 'x86_64')
        run: ./scripts/download-node.sh darwin x64

      - name: Download Node.js runtime (Linux)
        if: runner.os == 'Linux'
        run: ./scripts/download-node.sh linux x64

      - name: Download Node.js runtime (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: ./scripts/download-node.sh win x64

      # ---- 下载 uv 运行时 ----
      - name: Download uv (macOS universal)
        if: runner.os == 'macOS' && contains(matrix.args, 'universal')
        run: |
          ./scripts/download-uv.sh darwin arm64
          cp crates/agent-tauri-client/src-tauri/resources/uv/bin/uv /tmp/uv-arm64
          cp crates/agent-tauri-client/src-tauri/resources/uv/bin/uvx /tmp/uvx-arm64
          ./scripts/download-uv.sh darwin x64
          cp crates/agent-tauri-client/src-tauri/resources/uv/bin/uv /tmp/uv-x64
          cp crates/agent-tauri-client/src-tauri/resources/uv/bin/uvx /tmp/uvx-x64
          lipo -create /tmp/uv-arm64 /tmp/uv-x64 -output crates/agent-tauri-client/src-tauri/resources/uv/bin/uv
          lipo -create /tmp/uvx-arm64 /tmp/uvx-x64 -output crates/agent-tauri-client/src-tauri/resources/uv/bin/uvx
          chmod 755 crates/agent-tauri-client/src-tauri/resources/uv/bin/uv
          chmod 755 crates/agent-tauri-client/src-tauri/resources/uv/bin/uvx
          echo "==> Universal uv binary:"
          file crates/agent-tauri-client/src-tauri/resources/uv/bin/uv
          lipo -info crates/agent-tauri-client/src-tauri/resources/uv/bin/uv

      - name: Download uv (macOS aarch64)
        if: runner.os == 'macOS' && contains(matrix.args, 'aarch64')
        run: ./scripts/download-uv.sh darwin arm64

      - name: Download uv (macOS x86_64)
        if: runner.os == 'macOS' && contains(matrix.args, 'x86_64')
        run: ./scripts/download-uv.sh darwin x64

      - name: Download uv (Linux)
        if: runner.os == 'Linux'
        run: ./scripts/download-uv.sh linux x64

      - name: Download uv (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: ./scripts/download-uv.sh win x64

      # ---- 下载 sidecar（mcp-proxy/node-runtime）到缓存，并按当前构建目标投放到 binaries ----
      - name: Download sidecars for current target
        shell: bash
        run: |
          BINARIES_DIR=crates/agent-tauri-client/src-tauri/binaries
          if [ "${{ runner.os }}" = "macOS" ]; then
            if [[ "${{ matrix.args }}" == *"universal-apple-darwin"* ]]; then
              ./scripts/download-sidecars.sh --target aarch64-apple-darwin --target x86_64-apple-darwin --materialize
              lipo -create \
                "${BINARIES_DIR}/mcp-proxy-aarch64-apple-darwin" \
                "${BINARIES_DIR}/mcp-proxy-x86_64-apple-darwin" \
                -output "${BINARIES_DIR}/mcp-proxy-universal-apple-darwin"
              lipo -create \
                "${BINARIES_DIR}/node-runtime-aarch64-apple-darwin" \
                "${BINARIES_DIR}/node-runtime-x86_64-apple-darwin" \
                -output "${BINARIES_DIR}/node-runtime-universal-apple-darwin"
              chmod 755 "${BINARIES_DIR}/mcp-proxy-universal-apple-darwin" "${BINARIES_DIR}/node-runtime-universal-apple-darwin"
            elif [[ "${{ matrix.args }}" == *"x86_64-apple-darwin"* ]]; then
              ./scripts/download-sidecars.sh --target x86_64-apple-darwin --materialize
            else
              ./scripts/download-sidecars.sh --target aarch64-apple-darwin --materialize
            fi
          elif [ "${{ runner.os }}" = "Linux" ]; then
            ./scripts/download-sidecars.sh --target x86_64-unknown-linux-gnu --materialize
          else
            ./scripts/download-sidecars.sh --target x86_64-pc-windows-msvc --materialize
          fi

      # ---- macOS：仅当配置了证书时导入 keychain，供后续 codesign 使用 ----
      # 正式发布需在仓库 Secrets 配置：APPLE_CERTIFICATE（Base64 编码的 .p12）、APPLE_CERTIFICATE_PASSWORD、APPLE_SIGNING_IDENTITY。
      # 未配置证书时脚本内判断并跳过导入，签名步骤由 sign-macos-resource-bins.sh 在 identity 为空时跳过。
      # 正式发布 macOS 时请务必配置上述三个 Secret，否则打出的包未签名无法通过公证。
      # 注意：不能在 if 中使用 secrets 上下文，故在 run 内判断。
      - name: Import Apple certificate for code signing
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "${APPLE_CERTIFICATE:-}" ]; then
            echo "==> APPLE_CERTIFICATE not set, skipping import"
            exit 0
          fi
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=actions
          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          rm -f "$CERTIFICATE_PATH"

      # ---- macOS：安装 create-dmg 用于创建带 Applications 快捷方式的 DMG ----
      - name: Install create-dmg (macOS)
        if: runner.os == 'macOS'
        run: brew install create-dmg

      # ---- macOS：对 node/uv 资源做 codesign；未设置 APPLE_SIGNING_IDENTITY 时脚本内跳过 ----
      - name: Sign macOS resource binaries (node, uv)
        if: runner.os == 'macOS'
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: ./scripts/sign-macos-resource-bins.sh

      # ---- 构建 & 发布 ----
      # tauri-action 会自动执行 tauri.conf.json 中的 beforeBuildCommand (pnpm build)
      # 然后运行 cargo tauri build，最后将产物上传到 GitHub Release
      # 设置 TAURI_SIGNING_PRIVATE_KEY 后，tauri-action 会自动:
      #   1. 为每个平台的安装包生成 .sig 签名文件
      #   2. 生成跨平台的 latest.json 更新清单文件
      #
      # 注意：不在此设置 Tauri 的公证变量，因为：
      #   - Tauri 签名不带 JIT entitlement，必须由 post-sign 脚本重签
      #   - 重签后需要重新公证，所以 Tauri 的初始公证是冗余的
      #   - 公证由 post-sign-macos-app.sh 统一处理
      # 这会导致 Tauri 显示 "skipping app notarization" 警告，可安全忽略。
      - name: Build and release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        with:
          projectPath: crates/agent-tauri-client
          tagName: ${{ github.ref_name }}
          releaseName: "Nuwax Agent ${{ github.ref_name }}"
          releaseBody: ${{ needs.prepare-release.outputs.release_notes }}
          releaseDraft: false
          prerelease: false
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}

      # ---- macOS：Tauri 签名后对 node-runtime 补签 JIT entitlement，并重建 dmg/tar.gz ----
      # Tauri bundler 对 sidecar 签名时不附带 entitlements，但 node-runtime (V8) 需要 JIT。
      # 此步骤在 Tauri 构建完成后：重签 node-runtime → 重签 .app → 重建 .dmg/.tar.gz → 公证
      # 然后用 gh release upload --clobber 覆盖 tauri-action 上传的旧产物。
      - name: Post-sign node-runtime with JIT entitlement and notarize
        if: runner.os == 'macOS'
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_ISSUER_ID: ${{ secrets.APPLE_ISSUER_ID }}
        run: |
          # 准备 API Key 文件（notarytool 需要 .p8 文件路径）
          if [ -n "${APPLE_API_KEY:-}" ] && [ -n "${APPLE_API_KEY_ID:-}" ] && [ -n "${APPLE_ISSUER_ID:-}" ]; then
            APPLE_API_KEY_PATH="${RUNNER_TEMP}/AuthKey_${APPLE_API_KEY_ID}.p8"
            echo -n "${APPLE_API_KEY}" | base64 --decode -o "${APPLE_API_KEY_PATH}"
            export APPLE_API_KEY_PATH
            echo "==> 已配置 App Store Connect API Key，将执行公证"
          else
            echo "==> 未配置 APPLE_API_KEY / APPLE_API_KEY_ID / APPLE_ISSUER_ID，跳过公证"
          fi

          # 从 matrix.args 提取 --target 值
          TARGET=""
          if [[ "${{ matrix.args }}" == *"--target "* ]]; then
            TARGET=$(echo "${{ matrix.args }}" | grep -o '\-\-target [^ ]*' | head -1 | awk '{print $2}')
          fi
          if [ -n "$TARGET" ]; then
            ./scripts/post-sign-macos-app.sh --target "$TARGET"
          else
            ./scripts/post-sign-macos-app.sh
          fi

          # 清理 API Key 文件
          if [ -n "${APPLE_API_KEY_PATH:-}" ] && [ -f "${APPLE_API_KEY_PATH}" ]; then
            rm -f "${APPLE_API_KEY_PATH}"
          fi

      # 用重建后的 .dmg 和 .app.tar.gz 覆盖 tauri-action 已上传的旧产物
      # 注意：需要重新生成 .app.tar.gz 的 .sig 签名文件（用于 Tauri updater 验证）
      - name: Replace release assets with re-signed artifacts
        if: runner.os == 'macOS'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          TAG="${{ github.ref_name }}"
          TARGET=""
          if [[ "${{ matrix.args }}" == *"--target "* ]]; then
            TARGET=$(echo "${{ matrix.args }}" | grep -o '\-\-target [^ ]*' | head -1 | awk '{print $2}')
          fi
          if [ -n "$TARGET" ]; then
            BUNDLE_BASE="target/${TARGET}/release/bundle"
          else
            BUNDLE_BASE="target/release/bundle"
          fi

          # 上传重建的 .dmg（覆盖旧文件）
          for dmg in "${BUNDLE_BASE}/dmg"/*.dmg; do
            if [ -f "$dmg" ]; then
              echo "Uploading $(basename "$dmg") ..."
              gh release upload "$TAG" "$dmg" --clobber --repo "$GITHUB_REPOSITORY"
            fi
          done

          # 上传重建的 .app.tar.gz
          # 注意：post-sign 和 Tauri 生成的文件名格式一致，都包含架构后缀
          # （如 Nuwax.Agent_aarch64.app.tar.gz）
          for targz in "${BUNDLE_BASE}/macos"/*.app.tar.gz; do
            if [ -f "$targz" ]; then
              echo "Uploading $(basename "$targz") ..."

              # 重新生成 .sig 签名文件（用于 Tauri updater 验证）
              # Tauri 使用 Ed25519 签名，通过 tauri signer sign 命令生成
              # 注意：tauri signer sign 输出包含额外文本，需要只提取 "Public signature:" 后的签名
              if [ -n "${TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
                echo "Generating new .sig for $(basename "$targz") ..."
                SIG_FILE="${targz}.sig"
                # 使用绝对路径（GITHUB_WORKSPACE 是项目根目录）
                ABSOLUTE_TARGZ="${GITHUB_WORKSPACE}/${targz}"
                # 提取 "Public signature:" 后面的那一行（实际的 base64 签名）
                pnpm --dir crates/agent-tauri-client tauri signer sign "$ABSOLUTE_TARGZ" | grep -A1 "Public signature:" | tail -1 > "$SIG_FILE"
                echo "Generated ${SIG_FILE}"
                echo "Signature content: $(cat "$SIG_FILE" | head -c 50)..."
              fi

              # 删除旧的 tar.gz 和 sig 文件（只删除当前架构的文件，避免并行构建竞态条件）
              # 根据 TARGET 变量确定要删除的文件名
              echo "Deleting old tar.gz files for current architecture from release..."
              ARCH_FILES=""
              if [[ "$TARGET" == *"aarch64"* ]]; then
                ARCH_FILES="Nuwax.Agent_aarch64.app.tar.gz Nuwax.Agent_aarch64.app.tar.gz.sig"
              elif [[ "$TARGET" == *"x86_64"* ]]; then
                ARCH_FILES="Nuwax.Agent_x64.app.tar.gz Nuwax.Agent_x64.app.tar.gz.sig"
              elif [[ "$TARGET" == *"universal"* ]]; then
                ARCH_FILES="Nuwax.Agent_universal.app.tar.gz Nuwax.Agent_universal.app.tar.gz.sig"
              else
                # 无 target 时，使用默认文件名
                ARCH_FILES="Nuwax.Agent.app.tar.gz Nuwax.Agent.app.tar.gz.sig"
              fi
              for f in $ARCH_FILES; do
                echo "Deleting $f..."
                gh release delete-asset "$TAG" "$f" --yes --repo "$GITHUB_REPOSITORY" 2>/dev/null || true
              done

              gh release upload "$TAG" "$targz" --clobber --repo "$GITHUB_REPOSITORY"

              # 上传新的 .sig 文件
              if [ -f "${targz}.sig" ]; then
                gh release upload "$TAG" "${targz}.sig" --clobber --repo "$GITHUB_REPOSITORY"
              fi
            fi
          done

          # 注意: latest.json 的签名更新已移至 update-latest-json job 中统一处理
          # 避免并行构建时的竞态条件导致签名互相覆盖

  # ---- 更新 latest.json 中的 macOS 签名 ----
  # 由于 post-sign 重建了 .app.tar.gz，需要重新生成签名
  # 必须在所有 macOS 构建完成后执行，避免竞态条件
  update-latest-json:
    name: Update latest.json signatures
    needs: [prepare-release, release-tauri]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Download latest.json and signatures
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          TAG="${{ github.ref_name }}"

          # 下载 latest.json
          gh release download "$TAG" --pattern "latest.json" --repo "$GITHUB_REPOSITORY"

          # 下载所有 macOS 签名文件
          gh release download "$TAG" --pattern "*.app.tar.gz.sig" --repo "$GITHUB_REPOSITORY" || true

      - name: Update signatures
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"

          # 签名文件映射：sig 文件名 -> 对应的 latest.json platform keys
          declare -A SIG_MAP=(
            ["Nuwax.Agent_aarch64.app.tar.gz.sig"]="darwin-aarch64 darwin-aarch64-app"
            ["Nuwax.Agent_x64.app.tar.gz.sig"]="darwin-x86_64 darwin-x86_64-app"
            ["Nuwax.Agent_universal.app.tar.gz.sig"]="darwin-universal darwin-universal-app"
          )

          for sig_file in *.app.tar.gz.sig; do
            if [ -f "$sig_file" ]; then
              SIG_CONTENT=$(cat "$sig_file")
              PLATFORM_KEYS=${SIG_MAP[$sig_file]}

              if [ -n "$PLATFORM_KEYS" ]; then
                for key in $PLATFORM_KEYS; do
                  echo "Updating signature for $key"
                  jq --arg sig "$SIG_CONTENT" --arg key "$key" \
                    'if .platforms[$key] then .platforms[$key].signature = $sig else . end' \
                    latest.json > latest.json.tmp && mv latest.json.tmp latest.json
                done
              else
                echo "Warning: Unknown signature file $sig_file, skipping"
              fi
            fi
          done

          echo "==> Updated latest.json:"
          cat latest.json

      - name: Upload updated latest.json
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          TAG="${{ github.ref_name }}"
          gh release upload "$TAG" latest.json --clobber --repo "$GITHUB_REPOSITORY"
          echo "Uploaded updated latest.json"

  # ---- 追加安装说明到 GitHub Release 页面 ----
  # 所有平台构建完成后，将安装指引追加到 Release body 末尾
  # 最终 GitHub Release = 自定义更新日志 + 分隔线 + 安装说明
  # latest.json notes = 仅自定义更新日志（由 tauri-action 在 build 阶段写入）
  update-release-body:
    name: Append install instructions to release
    needs: [prepare-release, release-tauri, update-latest-json]
    runs-on: ubuntu-latest
    steps:
      - name: Append install instructions
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          RELEASE_NOTES: ${{ needs.prepare-release.outputs.release_notes }}
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"

          read -r -d '' INSTALL_GUIDE << 'GUIDE' || true
          ## 安装说明

          请在下方 Assets 中下载对应平台的安装包：
          - **macOS (推荐)**: `_universal.dmg` — 通用安装包，同时支持 Intel 和 Apple Silicon
          - **macOS (单架构)**: `_aarch64.dmg` (Apple Silicon) / `_x64.dmg` (Intel)
          - **Windows**: `.msi` / `.nsis`
          - **Linux**: `.deb` / `.AppImage`

          客户端支持自动更新，无需手动下载。
          GUIDE

          FULL_BODY="${RELEASE_NOTES}

          ---

          ${INSTALL_GUIDE}"

          gh release edit "$TAG" --notes "$FULL_BODY" --repo "$GITHUB_REPOSITORY"

  # ---- 同步 Release 产物到阿里云 OSS ----
  # 中国大陆用户从 GitHub Releases 下载更慢，同步到 OSS 加速
  # 同时改写 latest.json 中的下载 URL 为 OSS 地址，供 Tauri updater 使用
  sync-to-oss:
    name: Sync release assets to Alibaba Cloud OSS
    needs: [release-tauri, update-latest-json]
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Install ossutil v2
        run: |
          curl -fSL -o /tmp/ossutil.zip \
            "https://gosspublic.alicdn.com/ossutil/v2/2.2.0/ossutil-2.2.0-linux-amd64.zip"
          unzip -q /tmp/ossutil.zip -d /tmp
          sudo mv /tmp/ossutil-2.2.0-linux-amd64/ossutil /usr/local/bin/
          ossutil version

      - name: Download all release assets
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          mkdir -p /tmp/release-assets
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" --dir /tmp/release-assets
          echo "==> Downloaded assets:"
          ls -lh /tmp/release-assets/

      - name: Upload assets to OSS
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          OSS_ENDPOINT="https://oss-rg-china-mainland.aliyuncs.com"
          OSS_REGION="rg-china-mainland"
          OSS_BUCKET="oss://nuwa-packages"
          OSS_PREFIX="nuwax-agent-client/${TAG}"

          for file in /tmp/release-assets/*; do
            filename=$(basename "$file")
            # latest.json 由下一步改写后单独上传，此处跳过
            if [ "$filename" = "latest.json" ]; then
              echo "Skipping: ${filename} (will be rewritten and uploaded in next step)"
              continue
            fi
            echo "Uploading: ${filename}"
            ossutil cp --force "$file" "${OSS_BUCKET}/${OSS_PREFIX}/${filename}" \
              --endpoint "$OSS_ENDPOINT" \
              --region "$OSS_REGION" \
              --access-key-id "$OSS_ACCESS_KEY_ID" \
              --access-key-secret "$OSS_ACCESS_KEY_SECRET"
          done

      - name: Rewrite latest.json URLs and upload
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          OSS_ENDPOINT="https://oss-rg-china-mainland.aliyuncs.com"
          OSS_REGION="rg-china-mainland"
          OSS_BUCKET="oss://nuwa-packages"
          LATEST_JSON="/tmp/release-assets/latest.json"

          if [ ! -f "$LATEST_JSON" ]; then
            echo "::warning::latest.json not found, skipping URL rewrite"
            exit 0
          fi

          echo "==> Original latest.json:"
          cat "$LATEST_JSON"

          # Replace GitHub Release download URLs with OSS URLs
          GITHUB_PREFIX="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/"
          OSS_URL_PREFIX="https://nuwa-packages.oss-rg-china-mainland.aliyuncs.com/nuwax-agent-client/${TAG}/"
          sed -i "s|${GITHUB_PREFIX}|${OSS_URL_PREFIX}|g" "$LATEST_JSON"

          echo "==> Rewritten latest.json:"
          cat "$LATEST_JSON"

          # Upload to versioned path
          ossutil cp --force "$LATEST_JSON" "${OSS_BUCKET}/nuwax-agent-client/${TAG}/latest.json" \
            --endpoint "$OSS_ENDPOINT" \
            --region "$OSS_REGION" \
            --access-key-id "$OSS_ACCESS_KEY_ID" \
            --access-key-secret "$OSS_ACCESS_KEY_SECRET"

          # Upload to stable path for updater endpoint
          ossutil cp --force "$LATEST_JSON" "${OSS_BUCKET}/nuwax-agent-client/latest/latest.json" \
            --endpoint "$OSS_ENDPOINT" \
            --region "$OSS_REGION" \
            --access-key-id "$OSS_ACCESS_KEY_ID" \
            --access-key-secret "$OSS_ACCESS_KEY_SECRET"

      - name: Verify OSS upload
        run: |
          VERIFY_URL="https://nuwa-packages.oss-rg-china-mainland.aliyuncs.com/nuwax-agent-client/latest/latest.json"
          HTTP_STATUS=$(curl -sS -o /tmp/oss-latest.json -w "%{http_code}" "$VERIFY_URL")
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "==> Verification passed (HTTP ${HTTP_STATUS})"
            cat /tmp/oss-latest.json
          else
            echo "::error::OSS verification failed: ${VERIFY_URL} returned HTTP ${HTTP_STATUS}"
            exit 1
          fi
