# Tauri 桌面客户端 — Windows 版本发布（快速测试用）
# 推送 win-v* tag 触发，仅构建 Windows 安装包并创建 GitHub Release
# 全平台发布请使用 release-tauri.yml（推送 v* tag 触发）
#
# 支持平台：
#   - Windows x86_64
#
# 触发方式：
#   - 推送 win-v* tag → 构建 + 创建 Release + 签名 + 生成 latest.json
#
# 注意事项：
#   - nuwax-agent-core 依赖了 nuwax-ai 组织的 git 仓库（rcoder）
#     GH_PAT：拉取私有依赖需 Contents: Read；创建/编辑 Release、上传资产需 Contents: Write（可同一 Token 配齐）
#   - Tauri 客户端不启用 p2p-connection feature，因此不依赖 librustdesk / vcpkg

name: Release Tauri App (Windows Only)

on:
  push:
    tags:
      - "win-v*"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # 使用系统 git 拉取 cargo git 依赖，确保能使用已配置的凭据
  CARGO_NET_GIT_FETCH_WITH_CLI: true

permissions:
  contents: write

jobs:
  # ---- 准备发布说明并预先创建 Release ----
  # 从 release-notes/{tag}.md 读取更新日志；先在此处创建 Release，避免 5 个 matrix 任务同时创建导致竞态（仅 Mac 报 Server Error 多为该原因）
  prepare-release:
    name: Prepare release notes
    runs-on: ubuntu-latest
    outputs:
      release_notes: ${{ steps.notes.outputs.content }}
    steps:
      - uses: actions/checkout@v4
      - name: Read release notes
        id: notes
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          NOTES_FILE="release-notes/${TAG}.md"
          if [ -f "$NOTES_FILE" ]; then
            CONTENT=$(cat "$NOTES_FILE")
          else
            CONTENT="功能优化和问题修复。建议更新到最新版本以获得更好的体验。"
          fi
          echo "content<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CONTENT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "$CONTENT" > release_notes.txt

      # 先创建 Release，避免多个 matrix 任务同时“创建”导致冲突（仅 Mac 报错多为竞态）
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          TAG="${{ github.ref_name }}"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" 2>/dev/null; then
            echo "Release $TAG already exists, skipping create"
          else
            gh release create "$TAG" --notes-file release_notes.txt --repo "$GITHUB_REPOSITORY"
            echo "Created release $TAG"
          fi

  release-tauri:
    name: Build Tauri (${{ matrix.platform }})
    needs: prepare-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
            rust_targets: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---- 私有 Git 仓库认证（nuwax-ai 组织下的 rcoder, nuwax-rustdesk 等） ----
      # Settings → Secrets 配置 GH_PAT（拉取私有依赖 + Release 操作用同一 Token 时需 Contents: Read + Write）
      - name: Configure git credentials for private repos
        run: |
          git config --global url."https://${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"

      # ---- protobuf 编译器（shared_types 的 prost-build 需要） ----
      - name: Install protoc (Windows)
        run: choco install protoc -y

      # ---- pnpm（从 package.json 的 packageManager 字段读取版本 9.15.5） ----
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: crates/agent-tauri-client/package.json

      # ---- Node.js（pnpm 缓存指向子目录的 lockfile） ----
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
          cache-dependency-path: crates/agent-tauri-client/pnpm-lock.yaml

      # ---- Rust ----
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      # Cargo workspace 在仓库根目录，target 也在根目录
      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          cache-on-failure: true

      # ---- 从 git tag 同步版本号到 package.json ----
      # tauri.conf.json 的 version 已指向 "../package.json"，Tauri 会自动读取
      # 因此只需更新 package.json 这一个文件即可
      # 注意：tag 格式为 win-v1.0.0，需要去掉 win-v 前缀
      - name: Sync version from git tag
        if: github.ref_type == 'tag'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#win-v}"
          echo "Syncing version: $VERSION"
          cd crates/agent-tauri-client
          jq --arg v "$VERSION" '.version = $v' package.json > package.json.tmp && mv package.json.tmp package.json
          echo "package.json version: $(jq -r .version package.json)"

      # ---- 前端依赖 ----
      - name: Install frontend dependencies
        working-directory: crates/agent-tauri-client
        run: pnpm install

      # ---- 下载 Node.js 运行时到 Tauri 资源目录（bundle resources 需要） ----
      - name: Download Node.js runtime (Windows)
        shell: bash
        run: ./scripts/download-node.sh win x64

      # ---- 下载 uv 运行时 ----
      - name: Download uv (Windows)
        shell: bash
        run: ./scripts/download-uv.sh win x64

      - name: Download sidecars for windows target
        shell: bash
        run: ./scripts/download-sidecars.sh --target x86_64-pc-windows-msvc --materialize

      # ---- 构建 & 发布 ----
      # tauri-action 会自动执行 tauri.conf.json 中的 beforeBuildCommand (pnpm build)
      # 然后运行 cargo tauri build，最后将产物上传到 GitHub Release
      # 设置 TAURI_SIGNING_PRIVATE_KEY 后，tauri-action 会自动:
      #   1. 为每个平台的安装包生成 .sig 签名文件
      #   2. 生成跨平台的 latest.json 更新清单文件
      - name: Build and release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: crates/agent-tauri-client
          tagName: ${{ github.ref_name }}
          releaseName: "Nuwax Agent ${{ github.ref_name }}"
          releaseBody: ${{ needs.prepare-release.outputs.release_notes }}
          releaseDraft: false
          prerelease: false
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}

  # ---- 追加安装说明到 GitHub Release 页面 ----
  # 所有平台构建完成后，将安装指引追加到 Release body 末尾
  # 最终 GitHub Release = 自定义更新日志 + 分隔线 + 安装说明
  # latest.json notes = 仅自定义更新日志（由 tauri-action 在 build 阶段写入）
  update-release-body:
    name: Append install instructions to release
    needs: [prepare-release, release-tauri]
    runs-on: ubuntu-latest
    steps:
      - name: Append install instructions
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          RELEASE_NOTES: ${{ needs.prepare-release.outputs.release_notes }}
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"

          read -r -d '' INSTALL_GUIDE << 'GUIDE' || true
          ## 安装说明

          请在下方 Assets 中下载对应平台的安装包：
          - **Windows**: `.msi` / `.nsis`

          客户端支持自动更新，无需手动下载。
          GUIDE

          FULL_BODY="${RELEASE_NOTES}

          ---

          ${INSTALL_GUIDE}"

          gh release edit "$TAG" --notes "$FULL_BODY" --repo "$GITHUB_REPOSITORY"

  # ---- 同步 Release 产物到阿里云 OSS ----
  # 中国大陆用户从 GitHub Releases 下载更慢，同步到 OSS 加速
  # 同时改写 latest.json 中的下载 URL 为 OSS 地址，供 Tauri updater 使用
  sync-to-oss:
    name: Sync release assets to Alibaba Cloud OSS
    needs: [release-tauri, update-release-body]
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Install ossutil v2
        run: |
          curl -fSL -o /tmp/ossutil.zip \
            "https://gosspublic.alicdn.com/ossutil/v2/2.2.0/ossutil-2.2.0-linux-amd64.zip"
          unzip -q /tmp/ossutil.zip -d /tmp
          sudo mv /tmp/ossutil-2.2.0-linux-amd64/ossutil /usr/local/bin/
          ossutil version

      - name: Download all release assets
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          mkdir -p /tmp/release-assets
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" --dir /tmp/release-assets
          echo "==> Downloaded assets:"
          ls -lh /tmp/release-assets/

      - name: Upload assets to OSS
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          OSS_ENDPOINT="https://oss-rg-china-mainland.aliyuncs.com"
          OSS_REGION="rg-china-mainland"
          OSS_BUCKET="oss://nuwa-packages"
          OSS_PREFIX="nuwax-agent-client/${TAG}"

          for file in /tmp/release-assets/*; do
            filename=$(basename "$file")
            # latest.json 由下一步改写后单独上传，此处跳过
            if [ "$filename" = "latest.json" ]; then
              echo "Skipping: ${filename} (will be rewritten and uploaded in next step)"
              continue
            fi
            echo "Uploading: ${filename}"
            ossutil cp --force "$file" "${OSS_BUCKET}/${OSS_PREFIX}/${filename}" \
              --endpoint "$OSS_ENDPOINT" \
              --region "$OSS_REGION" \
              --access-key-id "$OSS_ACCESS_KEY_ID" \
              --access-key-secret "$OSS_ACCESS_KEY_SECRET"
          done

      - name: Rewrite latest.json URLs and upload
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          OSS_ENDPOINT="https://oss-rg-china-mainland.aliyuncs.com"
          OSS_REGION="rg-china-mainland"
          OSS_BUCKET="oss://nuwa-packages"
          LATEST_JSON="/tmp/release-assets/latest.json"

          if [ ! -f "$LATEST_JSON" ]; then
            echo "::warning::latest.json not found, skipping URL rewrite"
            exit 0
          fi

          echo "==> Original latest.json:"
          cat "$LATEST_JSON"

          # Replace GitHub Release download URLs with OSS URLs
          GITHUB_PREFIX="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/"
          OSS_URL_PREFIX="https://nuwa-packages.oss-rg-china-mainland.aliyuncs.com/nuwax-agent-client/${TAG}/"
          sed -i "s|${GITHUB_PREFIX}|${OSS_URL_PREFIX}|g" "$LATEST_JSON"

          echo "==> Rewritten latest.json:"
          cat "$LATEST_JSON"

          # Upload to versioned path
          ossutil cp --force "$LATEST_JSON" "${OSS_BUCKET}/nuwax-agent-client/${TAG}/latest.json" \
            --endpoint "$OSS_ENDPOINT" \
            --region "$OSS_REGION" \
            --access-key-id "$OSS_ACCESS_KEY_ID" \
            --access-key-secret "$OSS_ACCESS_KEY_SECRET"

          # Upload to stable path for updater endpoint
          ossutil cp --force "$LATEST_JSON" "${OSS_BUCKET}/nuwax-agent-client/latest/latest.json" \
            --endpoint "$OSS_ENDPOINT" \
            --region "$OSS_REGION" \
            --access-key-id "$OSS_ACCESS_KEY_ID" \
            --access-key-secret "$OSS_ACCESS_KEY_SECRET"

      - name: Verify OSS upload
        run: |
          VERIFY_URL="https://nuwa-packages.oss-rg-china-mainland.aliyuncs.com/nuwax-agent-client/latest/latest.json"
          HTTP_STATUS=$(curl -sS -o /tmp/oss-latest.json -w "%{http_code}" "$VERIFY_URL")
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "==> Verification passed (HTTP ${HTTP_STATUS})"
            cat /tmp/oss-latest.json
          else
            echo "::error::OSS verification failed: ${VERIFY_URL} returned HTTP ${HTTP_STATUS}"
            exit 1
          fi
