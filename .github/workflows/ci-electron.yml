# Electron 桌面客户端 — 测试构建 CI
# 与 release-electron.yml 分开：构建无签名包并上传到 Draft Release，不影响正式版本。
#
# 触发方式：
#   - 推送 tag 匹配 test*（例如 test0.8.0）→ 构建全平台安装包，上传到 Draft Release
#   - 手动触发 workflow_dispatch（可选平台）
#
# 与 release-electron.yml 的区别：
#   - 创建 Draft Release（草稿），用户在 Releases 页面不可见，不影响正式版本
#   - 不签名、不公证（Mac 为无签名包）
#   - 用于测试构建与安装验证

name: Electron Desktop Client (Testing Build)

on:
  push:
    tags:
      - "test*"
  workflow_dispatch:
    inputs:
      platform:
        description: "构建平台"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - mac
          - win
          - linux
          - linux-arm64

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare draft release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/test')
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Get version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#test}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Test build version: $VERSION"

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#test}"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" 2>/dev/null; then
            echo "Release $TAG already exists, deleting and recreating"
            gh release delete "$TAG" --repo "$GITHUB_REPOSITORY" --yes
          fi
          gh release create "$TAG" \
            --title "NuwaxBot Test Build ${VERSION}" \
            --notes "测试构建 ${VERSION}，仅供内部测试安装。" \
            --draft \
            --repo "$GITHUB_REPOSITORY"
          echo "Created draft release $TAG"

  setup-matrix:
    name: Setup matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.out.outputs.matrix }}
    steps:
      - id: out
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            case "${{ github.event.inputs.platform }}" in
              mac)       echo 'matrix={"include":[{"platform":"macos-latest","dist_cmd":"dist:mac:unsigned","artifact_os":"mac"}]}' >> "$GITHUB_OUTPUT" ;;
              win)       echo 'matrix={"include":[{"platform":"windows-latest","dist_cmd":"dist:win","artifact_os":"win"}]}' >> "$GITHUB_OUTPUT" ;;
              linux)     echo 'matrix={"include":[{"platform":"ubuntu-24.04","dist_cmd":"dist:linux:x64","artifact_os":"linux-x64"}]}' >> "$GITHUB_OUTPUT" ;;
              linux-arm64) echo 'matrix={"include":[{"platform":"ubuntu-24.04-arm","dist_cmd":"dist:linux:arm64","artifact_os":"linux-arm64"}]}' >> "$GITHUB_OUTPUT" ;;
              *)         echo 'matrix={"include":[{"platform":"macos-latest","dist_cmd":"dist:mac:unsigned","artifact_os":"mac"},{"platform":"windows-latest","dist_cmd":"dist:win","artifact_os":"win"},{"platform":"ubuntu-24.04","dist_cmd":"dist:linux:x64","artifact_os":"linux-x64"},{"platform":"ubuntu-24.04-arm","dist_cmd":"dist:linux:arm64","artifact_os":"linux-arm64"}]}' >> "$GITHUB_OUTPUT" ;;
            esac
          else
            echo 'matrix={"include":[{"platform":"macos-latest","dist_cmd":"dist:mac:unsigned","artifact_os":"mac"},{"platform":"windows-latest","dist_cmd":"dist:win","artifact_os":"win"},{"platform":"ubuntu-24.04","dist_cmd":"dist:linux:x64","artifact_os":"linux-x64"},{"platform":"ubuntu-24.04-arm","dist_cmd":"dist:linux:arm64","artifact_os":"linux-arm64"}]}' >> "$GITHUB_OUTPUT"
          fi

  build-electron:
    name: Build Electron (${{ matrix.platform }})
    needs: [prepare, setup-matrix]
    if: ${{ !cancelled() && !failure() }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/test')
        shell: bash
        working-directory: crates/agent-electron-client
        run: |
          VERSION="${GITHUB_REF_NAME#test}"
          npm pkg set version="$VERSION"
          echo "Set package.json version to: $VERSION"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: crates/agent-electron-client/package-lock.json

      # Python 3.12+ 移除了 distutils，node-gyp（better-sqlite3 等 native 模块）依赖它
      - name: Install setuptools for node-gyp (Python 3.12+)
        shell: bash
        run: python3 -m pip install setuptools --break-system-packages 2>/dev/null || python3 -m pip install setuptools

      # Linux 构建 deb/rpm 包需要 rpm 工具；arm64 runner 需要系统 fpm（内置 fpm 仅 x86）
      - name: Install Linux build tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm ruby ruby-dev
          sudo gem install fpm
          echo "USE_SYSTEM_FPM=true" >> "$GITHUB_ENV"

      - name: Install dependencies
        working-directory: crates/agent-electron-client
        run: npm install

      # 为 Electron 内嵌 Node 重编 better-sqlite3，避免 Linux arm64 等平台运行时 "cannot open shared object file"
      - name: Rebuild native modules for Electron
        working-directory: crates/agent-electron-client
        run: npm run electron-rebuild

      # 缓存内置 Node.js（所有平台）、Git（仅 Windows）和 uv（所有平台）
      - name: Cache bundled Node.js
        uses: actions/cache@v4
        with:
          path: crates/agent-electron-client/resources/node
          key: bundled-node-24-${{ matrix.platform }}-${{ hashFiles('crates/agent-electron-client/package.json') }}

      - name: Cache bundled Git (Windows only)
        if: matrix.platform == 'windows-latest'
        uses: actions/cache@v4
        with:
          path: crates/agent-electron-client/resources/git
          key: bundled-git-2.47.1-windows-${{ hashFiles('crates/agent-electron-client/package.json') }}

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: crates/agent-electron-client/resources/uv
          key: bundled-uv-${{ matrix.platform }}-${{ hashFiles('crates/agent-electron-client/package.json') }}

      - name: Prepare bundled resources (uv, node, git)
        working-directory: crates/agent-electron-client
        run: npm run prepare:all
        timeout-minutes: 15

      - name: Build Electron app (unsigned, no publish)
        working-directory: crates/agent-electron-client
        run: npm run ${{ matrix.dist_cmd }} -- --publish never

      - name: Upload to draft release
        if: startsWith(github.ref, 'refs/tags/test')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#test}"
          OUT_DIR="crates/agent-electron-client/release/${VERSION}"
          if [ ! -d "$OUT_DIR" ]; then
            echo "::error::Output directory not found: $OUT_DIR"
            exit 1
          fi
          for f in "${OUT_DIR}"/*.{dmg,exe,msi,AppImage,deb,rpm}; do
            [ -e "$f" ] || continue
            echo "Uploading $(basename "$f") ..."
            gh release upload "$TAG" "$f" --clobber --repo "$GITHUB_REPOSITORY"
          done

      - name: Upload artifacts (workflow_dispatch fallback)
        if: ${{ !startsWith(github.ref, 'refs/tags/test') }}
        uses: actions/upload-artifact@v4
        with:
          name: electron-${{ matrix.artifact_os }}
          path: crates/agent-electron-client/release/
          retention-days: 7
