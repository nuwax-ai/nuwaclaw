# Electron 桌面客户端 — 正式版本发布
# 与 Tauri 客户端完全分开：使用独立 tag 与独立 GitHub Release，不共用 v* tag。
#
# 触发方式：
#   - 推送 tag 匹配 electron-v*（例如 electron-v0.4.0）→ 构建全平台安装包并创建 Release
#
# 支持平台：
#   - macOS arm64（macos-latest）
#   - macOS x64（macos-14-large）
#   - Windows x64（msi）
#   - Linux x64（AppImage + deb）
#   - Linux arm64（AppImage + deb）
#
# 使用的 Secrets（可与 Tauri 共用 Apple 相关，也可单独配置）：
#   - GH_PAT（可选）：创建 Release、上传资产（未配置时自动回退到 github.token，需 Contents: Write）
#   - macOS 签名/公证（未配置时 Mac 构建为无签名包，用户打开会提示「已损坏」）：
#     - APPLE_CERTIFICATE（.p12 Base64）/ APPLE_CERTIFICATE_PASSWORD / APPLE_SIGNING_IDENTITY
#     - 公证（否则 Gatekeeper 仍可能拦）：APPLE_API_KEY（.p8 Base64）/ APPLE_API_KEY_ID / APPLE_API_ISSUER（或 APPLE_ISSUER_ID）
#
# 产物目录：crates/agent-electron-client/release/${version}/（由 package.json directories.output 决定）

name: Release Electron App

on:
  push:
    tags:
      - "electron-v*"

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#electron-v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Electron release version: $VERSION"

      - name: Read release notes
        id: notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ github.ref_name }}"
          NOTES_FILE="release-notes/${TAG}.md"
          if [ -f "$NOTES_FILE" ]; then
            echo "Using release notes from $NOTES_FILE"
            cp "$NOTES_FILE" release_notes.txt
          else
            echo "Electron 桌面客户端 ${VERSION}。请在 Assets 中下载对应平台安装包。" > release_notes.txt
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" 2>/dev/null; then
            echo "Release $TAG already exists"
          else
            gh release create "$TAG" \
              --title "NuwaxBot (Electron) ${{ steps.version.outputs.version }}" \
              --notes-file release_notes.txt \
              --repo "$GITHUB_REPOSITORY"
            echo "Created release $TAG"
          fi

  build-electron:
    name: Build Electron (${{ matrix.platform }} ${{ matrix.arch }})
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            arch: arm64
            dist_cmd: dist:mac:arm64
          - platform: macos-14-large
            arch: x64
            dist_cmd: dist:mac:x64
          - platform: windows-latest
            arch: x64
            dist_cmd: dist:win
          - platform: ubuntu-24.04
            arch: x64
            dist_cmd: dist:linux:x64
          - platform: ubuntu-24.04-arm
            arch: arm64
            dist_cmd: dist:linux:arm64

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version in package.json
        shell: bash
        working-directory: crates/agent-electron-client
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          npm pkg set version="$VERSION"
          echo "package.json version: $(npm pkg get version)"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: crates/agent-electron-client/package-lock.json

      # Python 3.12+ 移除了 distutils，node-gyp（better-sqlite3 等 native 模块）依赖它；安装 setuptools 以提供 distutils
      - name: Install setuptools for node-gyp (Python 3.12+)
        shell: bash
        run: python3 -m pip install setuptools --break-system-packages 2>/dev/null || python3 -m pip install setuptools

      # Linux 构建 deb/rpm 包需要 rpm 工具；arm64 runner 需要系统 fpm（内置 fpm 仅 x86）
      - name: Install Linux build tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm ruby ruby-dev
          sudo gem install fpm
          echo "USE_SYSTEM_FPM=true" >> "$GITHUB_ENV"

      # 使用 npm install 替代 npm ci：lock 仅含当前平台的可选依赖，其他平台（esbuild/rollup 等）会报 Missing，install 会在各 runner 上按需解析
      - name: Install dependencies
        working-directory: crates/agent-electron-client
        run: npm install

      # 为 Electron 内嵌 Node 重编 better-sqlite3，避免 Linux arm64 等平台运行时 "cannot open shared object file"
      - name: Rebuild native modules for Electron
        working-directory: crates/agent-electron-client
        run: npm run electron-rebuild

      - name: Run unit tests
        working-directory: crates/agent-electron-client
        run: npm run test:run

      - name: Check import boundaries
        working-directory: crates/agent-electron-client
        run: npm run check:boundaries

      # 缓存内置 Node.js（所有平台）、Git（仅 Windows）和 uv（所有平台）
      - name: Cache bundled Node.js
        uses: actions/cache@v4
        with:
          path: crates/agent-electron-client/resources/node
          key: bundled-node-24-${{ matrix.platform }}-${{ hashFiles('crates/agent-electron-client/package.json') }}

      - name: Cache bundled Git (Windows only)
        if: matrix.platform == 'windows-latest'
        uses: actions/cache@v4
        with:
          path: crates/agent-electron-client/resources/git
          key: bundled-git-2.47.1-windows-${{ hashFiles('crates/agent-electron-client/package.json') }}

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: crates/agent-electron-client/resources/uv
          key: bundled-uv-${{ matrix.platform }}-${{ hashFiles('crates/agent-electron-client/package.json') }}

      - name: Prepare bundled resources (uv, node, git)
        working-directory: crates/agent-electron-client
        run: npm run prepare:all
        timeout-minutes: 15

      # ---- macOS：导入证书并配置公证（可选） ----
      - name: Import Apple certificate (macOS)
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "${APPLE_CERTIFICATE:-}" ]; then
            echo "APPLE_CERTIFICATE not set, signing will be skipped"
            exit 0
          fi
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=actions
          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          rm -f "$CERTIFICATE_PATH"
          echo "CSC_KEYCHAIN=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Prepare Apple notarization key (macOS)
        if: runner.os == 'macOS'
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_ISSUER_ID: ${{ secrets.APPLE_ISSUER_ID }}
        run: |
          if [ -z "${APPLE_API_KEY_BASE64:-}" ] || [ -z "${APPLE_API_KEY_ID:-}" ]; then
            echo "Apple notarization secrets not set, notarization will be skipped"
            exit 0
          fi
          ISSUER="${APPLE_API_ISSUER:-$APPLE_ISSUER_ID}"
          if [ -z "$ISSUER" ]; then
            echo "APPLE_API_ISSUER or APPLE_ISSUER_ID required for notarization"
            exit 0
          fi
          mkdir -p "$RUNNER_TEMP/apple-api-key"
          echo -n "$APPLE_API_KEY_BASE64" | base64 --decode -o "$RUNNER_TEMP/apple-api-key/AuthKey.p8"
          echo "APPLE_API_KEY=$RUNNER_TEMP/apple-api-key/AuthKey.p8" >> "$GITHUB_ENV"
          echo "APPLE_API_KEY_ID=$APPLE_API_KEY_ID" >> "$GITHUB_ENV"
          echo "APPLE_API_ISSUER=$ISSUER" >> "$GITHUB_ENV"

      # 若用户看到「已损坏」：请确认已配置 APPLE_CERTIFICATE / APPLE_SIGNING_IDENTITY 及公证用 APPLE_API_KEY 等，且构建日志中有签名与公证成功
      - name: Clean previous build artifacts
        shell: bash
        working-directory: crates/agent-electron-client
        run: |
          rm -rf release node_modules/.cache
          echo "Cleaned release and cache directories"

      - name: Build Electron app
        shell: bash
        working-directory: crates/agent-electron-client
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          CSC_NAME: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          if [ "${{ runner.os }}" = "macOS" ] && [ -z "${{ secrets.APPLE_CERTIFICATE }}" ]; then
            echo "No Apple certificate, building unsigned Mac package for ${{ matrix.arch }}"
            npm run dist:mac:unsigned:${{ matrix.arch }} -- --publish never
          else
            npm run ${{ matrix.dist_cmd }} -- --publish never
          fi

      - name: Upload artifacts to Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${{ needs.prepare.outputs.version }}"
          OUT_DIR="crates/agent-electron-client/release/${VERSION}"
          if [ ! -d "$OUT_DIR" ]; then
            echo "::error::Output directory not found: $OUT_DIR"
            exit 1
          fi
          for f in "${OUT_DIR}"/*; do
            [ -e "$f" ] || continue
            [ -f "$f" ] || continue
            echo "Uploading $(basename "$f") ..."
            gh release upload "$TAG" "$f" --clobber --repo "$GITHUB_REPOSITORY"
          done

  # ==================== 同步到阿里云 OSS ====================
  sync-to-oss:
    name: Sync release assets to Alibaba Cloud OSS
    needs: [prepare, build-electron]
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      OSS_ENDPOINT: "https://oss-rg-china-mainland.aliyuncs.com"
      OSS_REGION: "rg-china-mainland"
      OSS_BUCKET: "oss://nuwa-packages"
      OSS_CDN_BASE: "https://nuwa-packages.oss-rg-china-mainland.aliyuncs.com"
    steps:
      - name: Install ossutil v2
        run: |
          curl -fSL -o /tmp/ossutil.zip \
            "https://gosspublic.alicdn.com/ossutil/v2/2.2.0/ossutil-2.2.0-linux-amd64.zip"
          unzip -q /tmp/ossutil.zip -d /tmp
          sudo mv /tmp/ossutil-2.2.0-linux-amd64/ossutil /usr/local/bin/
          ossutil version

      - name: Download all release assets
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          mkdir -p /tmp/release-assets
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" --dir /tmp/release-assets
          echo "==> Downloaded assets:"
          ls -lh /tmp/release-assets/

      - name: Upload all assets to versioned path
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          OSS_PREFIX="nuwaxbot-electron/${TAG}"

          for file in /tmp/release-assets/*; do
            filename=$(basename "$file")
            echo "Uploading: ${filename}"
            ossutil cp --force "$file" "${OSS_BUCKET}/${OSS_PREFIX}/${filename}" \
              --endpoint "$OSS_ENDPOINT" \
              --region "$OSS_REGION" \
              --access-key-id "$OSS_ACCESS_KEY_ID" \
              --access-key-secret "$OSS_ACCESS_KEY_SECRET"
          done

      - name: Rewrite latest yml URLs and upload to stable path
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          OSS_URL_PREFIX="${OSS_CDN_BASE}/nuwaxbot-electron/${TAG}"

          # Rewrite relative URLs in latest-*.yml to absolute URLs pointing to versioned path,
          # then upload only the yml files to latest/ — avoids duplicating large binaries.
          for yml in /tmp/release-assets/latest*.yml; do
            [ -f "$yml" ] || continue
            filename=$(basename "$yml")
            echo "==> Processing ${filename}"
            echo "  Original:"
            cat "$yml"

            # Replace relative "url: SomeFile.ext" with absolute "url: https://.../SomeFile.ext"
            sed -i "s|^  url: |  url: ${OSS_URL_PREFIX}/|g" "$yml"
            # Also rewrite top-level "path:" field (used by electron-updater as primary download)
            sed -i "s|^path: |path: ${OSS_URL_PREFIX}/|g" "$yml"

            echo "  Rewritten:"
            cat "$yml"

            ossutil cp --force "$yml" "${OSS_BUCKET}/nuwaxbot-electron/latest/${filename}" \
              --endpoint "$OSS_ENDPOINT" \
              --region "$OSS_REGION" \
              --access-key-id "$OSS_ACCESS_KEY_ID" \
              --access-key-secret "$OSS_ACCESS_KEY_SECRET"
          done

      - name: Generate and upload latest.json
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#electron-v}"
          OSS_URL_PREFIX="${OSS_CDN_BASE}/nuwaxbot-electron/${TAG}"
          ASSETS_DIR="/tmp/release-assets"

          # Get release notes and pub_date from GitHub Release
          RELEASE_JSON=$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json body,createdAt 2>/dev/null || echo '{}')
          NOTES=$(echo "$RELEASE_JSON" | jq -r '.body // "功能优化和问题修复。建议更新到最新版本以获得更好的体验。"' | head -c 500)
          PUB_DATE=$(echo "$RELEASE_JSON" | jq -r '.createdAt // empty')
          if [ -z "$PUB_DATE" ]; then
            PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")
          fi

          # Build platforms object by scanning release assets
          # Electron artifact naming: NuwaxBot-{version}-{arch}.{ext} or NuwaxBot-{version}-{arch}-mac.zip
          PLATFORMS="{}"

          # Helper: add platform entry
          add_platform() {
            local key="$1" file="$2"
            if [ -f "${ASSETS_DIR}/${file}" ]; then
              PLATFORMS=$(echo "$PLATFORMS" | jq --arg k "$key" --arg u "${OSS_URL_PREFIX}/${file}" \
                '. + {($k): {"url": $u}}')
              echo "  Added: ${key} -> ${file}"
            fi
          }

          echo "==> Scanning release assets for platforms..."

          # macOS (x64 has no arch suffix, arm64 does)
          add_platform "darwin-aarch64"     "NuwaxBot-${VERSION}-arm64.dmg"
          add_platform "darwin-aarch64-zip" "NuwaxBot-${VERSION}-arm64-mac.zip"
          add_platform "darwin-x86_64"      "NuwaxBot-${VERSION}.dmg"
          add_platform "darwin-x86_64-zip"  "NuwaxBot-${VERSION}-mac.zip"

          # Windows (electron-builder uses dots in NSIS/MSI filenames)
          add_platform "windows-x86_64"      "NuwaxBot.Setup.${VERSION}.exe"
          add_platform "windows-x86_64-nsis" "NuwaxBot.Setup.${VERSION}.exe"
          add_platform "windows-x86_64-msi"  "NuwaxBot.${VERSION}.msi"

          # Linux x64 (no arch suffix for AppImage, amd64 for deb, x86_64 for rpm)
          add_platform "linux-x86_64"          "NuwaxBot-${VERSION}.AppImage"
          add_platform "linux-x86_64-appimage" "NuwaxBot-${VERSION}.AppImage"
          add_platform "linux-x86_64-deb"      "NuwaxBot-${VERSION}-amd64.deb"
          add_platform "linux-x86_64-rpm"      "NuwaxBot-${VERSION}-x86_64.rpm"

          # Linux arm64
          add_platform "linux-aarch64"          "NuwaxBot-${VERSION}-arm64.AppImage"
          add_platform "linux-aarch64-appimage" "NuwaxBot-${VERSION}-arm64.AppImage"
          add_platform "linux-aarch64-deb"      "NuwaxBot-${VERSION}-arm64.deb"
          add_platform "linux-aarch64-rpm"      "NuwaxBot-${VERSION}-aarch64.rpm"

          # If no exact matches, try fuzzy matching by scanning all files
          if [ "$(echo "$PLATFORMS" | jq 'length')" = "0" ]; then
            echo "::warning::No exact filename matches, falling back to fuzzy scan"
            for file in "${ASSETS_DIR}"/*; do
              filename=$(basename "$file")
              case "$filename" in
                *.dmg|*.zip|*.exe|*.msi|*.AppImage|*.deb|*.rpm)
                  # Detect platform from filename
                  key=""
                  case "$filename" in
                    *arm64*mac*|*arm64*.dmg)  key="darwin-aarch64" ;;
                    *x64*mac*|*x64*.dmg)      key="darwin-x86_64" ;;
                    *Setup*.exe|*setup*.exe)   key="windows-x86_64" ;;
                    *.msi)                     key="windows-x86_64-msi" ;;
                    *arm64*.AppImage)          key="linux-aarch64" ;;
                    *amd64*.AppImage|*x64*.AppImage|*.AppImage) key="linux-x86_64" ;;
                    *arm64*.deb)               key="linux-aarch64-deb" ;;
                    *amd64*.deb|*x64*.deb)     key="linux-x86_64-deb" ;;
                    *aarch64*.rpm)             key="linux-aarch64-rpm" ;;
                    *x86_64*.rpm|*x64*.rpm)   key="linux-x86_64-rpm" ;;
                  esac
                  if [ -n "$key" ]; then
                    PLATFORMS=$(echo "$PLATFORMS" | jq --arg k "$key" --arg u "${OSS_URL_PREFIX}/${filename}" \
                      '. + {($k): {"url": $u}}')
                    echo "  Fuzzy: ${key} -> ${filename}"
                  fi
                  ;;
              esac
            done
          fi

          # Assemble final JSON
          LATEST_JSON=$(jq -n \
            --arg version "$VERSION" \
            --arg notes "$NOTES" \
            --arg pub_date "$PUB_DATE" \
            --argjson platforms "$PLATFORMS" \
            '{version: $version, notes: $notes, pub_date: $pub_date, platforms: $platforms}')

          echo "==> Generated latest.json:"
          echo "$LATEST_JSON" | jq .

          echo "$LATEST_JSON" > /tmp/latest.json

          # Upload to versioned path
          ossutil cp --force /tmp/latest.json "${OSS_BUCKET}/nuwaxbot-electron/${TAG}/latest.json" \
            --endpoint "$OSS_ENDPOINT" \
            --region "$OSS_REGION" \
            --access-key-id "$OSS_ACCESS_KEY_ID" \
            --access-key-secret "$OSS_ACCESS_KEY_SECRET"

          # Upload to latest/ stable path
          ossutil cp --force /tmp/latest.json "${OSS_BUCKET}/nuwaxbot-electron/latest/latest.json" \
            --endpoint "$OSS_ENDPOINT" \
            --region "$OSS_REGION" \
            --access-key-id "$OSS_ACCESS_KEY_ID" \
            --access-key-secret "$OSS_ACCESS_KEY_SECRET"

      - name: Verify OSS upload
        run: |
          PASS=0; TOTAL=0
          for f in latest.json latest-mac.yml latest.yml latest-linux.yml latest-linux-arm64.yml; do
            TOTAL=$((TOTAL + 1))
            VERIFY_URL="${OSS_CDN_BASE}/nuwaxbot-electron/latest/${f}"
            HTTP_STATUS=$(curl -sS -o "/tmp/oss-${f}" -w "%{http_code}" "$VERIFY_URL")
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "==> ${f}: OK (HTTP ${HTTP_STATUS})"
              cat "/tmp/oss-${f}"
              echo ""
              PASS=$((PASS + 1))
            else
              echo "::warning::${f} not found on OSS (HTTP ${HTTP_STATUS})"
            fi
          done
          echo ""
          echo "==> Verification: ${PASS}/${TOTAL} yml files found on OSS"
